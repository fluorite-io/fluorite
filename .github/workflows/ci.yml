name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  DATABASE_URL: postgres://postgres:postgres@localhost:5433/fluorite

jobs:
  # ---------------------------------------------------------------------------
  # Change detection — drives conditional execution of downstream jobs
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      needs-common: ${{ steps.compute.outputs.needs-common }}
      needs-wire: ${{ steps.compute.outputs.needs-wire }}
      needs-schema: ${{ steps.compute.outputs.needs-schema }}
      needs-core: ${{ steps.compute.outputs.needs-core }}
      needs-sdk: ${{ steps.compute.outputs.needs-sdk }}
      needs-iceberg: ${{ steps.compute.outputs.needs-iceberg }}
      needs-broker: ${{ steps.compute.outputs.needs-broker }}
      needs-cli: ${{ steps.compute.outputs.needs-cli }}
      needs-whitepaper: ${{ steps.compute.outputs.needs-whitepaper }}
      needs-leaf: ${{ steps.compute.outputs.needs-leaf }}
      needs-protocol: ${{ steps.compute.outputs.needs-protocol }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cargo:
              - 'Cargo.toml'
              - 'Cargo.lock'
            common:
              - 'crates/fluorite-common/**'
            wire:
              - 'crates/fluorite-wire/**'
              - 'proto/**'
            schema:
              - 'crates/fluorite-schema/**'
            core:
              - 'crates/fluorite-core/**'
            sdk:
              - 'crates/fluorite-sdk/**'
            iceberg:
              - 'crates/fluorite-iceberg/**'
            broker:
              - 'crates/fluorite-broker/**'
              - 'migrations/**'
            cli:
              - 'crates/fluorite-cli/**'
            whitepaper:
              - 'crates/fluorite-whitepaper/**'
            sdks:
              - 'sdks/**'

      - name: Compute transitive closure
        id: compute
        run: |
          # Start with direct changes
          common="${{ steps.filter.outputs.common }}"
          wire="${{ steps.filter.outputs.wire }}"
          schema="${{ steps.filter.outputs.schema }}"
          core="${{ steps.filter.outputs.core }}"
          sdk="${{ steps.filter.outputs.sdk }}"
          iceberg="${{ steps.filter.outputs.iceberg }}"
          broker="${{ steps.filter.outputs.broker }}"
          cli="${{ steps.filter.outputs.cli }}"
          whitepaper="${{ steps.filter.outputs.whitepaper }}"
          sdks="${{ steps.filter.outputs.sdks }}"
          cargo="${{ steps.filter.outputs.cargo }}"

          # Cargo.toml/lock changes affect everything
          if [[ "$cargo" == "true" ]]; then
            common=true wire=true schema=true core=true sdk=true
            iceberg=true broker=true cli=true whitepaper=true sdks=true
          fi

          # fluorite-common → wire, schema, sdk, broker, iceberg, cli
          if [[ "$common" == "true" ]]; then
            wire=true schema=true sdk=true broker=true iceberg=true cli=true
          fi

          # fluorite-wire → sdk, broker, iceberg, cli
          if [[ "$wire" == "true" ]]; then
            sdk=true broker=true iceberg=true cli=true
          fi

          # fluorite-schema → broker, iceberg, cli
          if [[ "$schema" == "true" ]]; then
            broker=true iceberg=true cli=true
          fi

          # fluorite-core → iceberg
          if [[ "$core" == "true" ]]; then
            iceberg=true
          fi

          # fluorite-sdk → cli
          if [[ "$sdk" == "true" ]]; then
            cli=true
          fi

          # fluorite-iceberg → broker (optional feature), cli
          if [[ "$iceberg" == "true" ]]; then
            broker=true cli=true
          fi

          # fluorite-broker → cli
          if [[ "$broker" == "true" ]]; then
            cli=true
          fi

          # Aggregate outputs
          echo "needs-common=$common" >> "$GITHUB_OUTPUT"
          echo "needs-wire=$wire" >> "$GITHUB_OUTPUT"
          echo "needs-schema=$schema" >> "$GITHUB_OUTPUT"
          echo "needs-core=$core" >> "$GITHUB_OUTPUT"
          echo "needs-sdk=$sdk" >> "$GITHUB_OUTPUT"
          echo "needs-iceberg=$iceberg" >> "$GITHUB_OUTPUT"
          echo "needs-broker=$broker" >> "$GITHUB_OUTPUT"
          echo "needs-cli=$cli" >> "$GITHUB_OUTPUT"
          echo "needs-whitepaper=$whitepaper" >> "$GITHUB_OUTPUT"

          # Composite flags for job groups
          needs_leaf=false
          if [[ "$common" == "true" || "$core" == "true" || "$whitepaper" == "true" ]]; then
            needs_leaf=true
          fi
          echo "needs-leaf=$needs_leaf" >> "$GITHUB_OUTPUT"

          needs_protocol=false
          if [[ "$wire" == "true" || "$schema" == "true" || "$sdk" == "true" || "$sdks" == "true" ]]; then
            needs_protocol=true
          fi
          echo "needs-protocol=$needs_protocol" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Formatting — always runs, no compilation
  # ---------------------------------------------------------------------------
  fmt:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Clippy — always runs
  # ---------------------------------------------------------------------------
  clippy:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # MSRV check — always runs
  # ---------------------------------------------------------------------------
  msrv-check:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo check --workspace --all-features

  # ---------------------------------------------------------------------------
  # Test leaf crates (no infra dependencies)
  # ---------------------------------------------------------------------------
  test-leaf-crates:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.needs-leaf == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo test -p fluorite-common -p fluorite-core -p fluorite-whitepaper

  # ---------------------------------------------------------------------------
  # Test protocol crates (need protobuf)
  # ---------------------------------------------------------------------------
  test-protocol-crates:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.needs-protocol == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo test -p fluorite-wire -p fluorite-schema -p fluorite-sdk

  # ---------------------------------------------------------------------------
  # Broker unit tests (no Postgres needed)
  # ---------------------------------------------------------------------------
  test-broker-unit:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.needs-broker == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo test -p fluorite-broker --lib

  # ---------------------------------------------------------------------------
  # Iceberg tests
  # ---------------------------------------------------------------------------
  test-iceberg:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.needs-iceberg == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo test -p fluorite-iceberg

  # ---------------------------------------------------------------------------
  # SDK tests (Java + Python)
  # ---------------------------------------------------------------------------
  test-sdk:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.needs-protocol == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run Java SDK tests
        working-directory: sdks/java/fluorite-sdk
        run: mvn test --batch-mode --no-transfer-progress

      - name: Run Python SDK tests
        working-directory: sdks/python
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
          pytest tests/

  # ---------------------------------------------------------------------------
  # Integration tests (Postgres + LocalStack, parallel via cargo)
  # All integration test binaries run concurrently on an 8-core runner.
  # ---------------------------------------------------------------------------
  test-integration:
    runs-on: ubuntu-latest-8-cores
    needs: [detect-changes, test-broker-unit]
    if: needs.detect-changes.outputs.needs-broker == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluorite
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      localstack:
        image: localstack/localstack:3.0
        env:
          SERVICES: s3
          DEBUG: "0"
          AWS_DEFAULT_REGION: us-east-1
        ports:
          - "4566:4566"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run database migrations
        run: |
          psql "$DATABASE_URL" -f migrations/001_init.sql
          psql "$DATABASE_URL" -f migrations/002_iceberg.sql

      - name: Create S3 bucket
        run: |
          pip install awscli-local
          awslocal s3 mb s3://fluorite-batches
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_ENDPOINT_URL: http://localhost:4566

      - name: Run integration tests (parallel)
        run: |
          cargo test -p fluorite-broker --no-fail-fast \
            --test admin_api_integration \
            --test auth_integration \
            --test coordinator_integration \
            --test db_integration \
            --test e2e_auth \
            --test e2e_load \
            --test e2e_reader_groups \
            --test e2e_write \
            --test integration \
            --test negative_tests \
            -- --include-ignored
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_ENDPOINT_URL: http://localhost:4566

  # ---------------------------------------------------------------------------
  # Jepsen chaos tests (Postgres + LocalStack, parallel via cargo)
  # All 22 jepsen test binaries (including #[ignore] soak tests) run
  # concurrently on an 8-core runner.
  # ---------------------------------------------------------------------------
  test-jepsen:
    runs-on: ubuntu-latest-8-cores
    needs: [detect-changes, test-broker-unit]
    if: needs.detect-changes.outputs.needs-broker == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluorite
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      localstack:
        image: localstack/localstack:3.0
        env:
          SERVICES: s3
          DEBUG: "0"
          AWS_DEFAULT_REGION: us-east-1
        ports:
          - "4566:4566"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run database migrations
        run: |
          psql "$DATABASE_URL" -f migrations/001_init.sql
          psql "$DATABASE_URL" -f migrations/002_iceberg.sql

      - name: Create S3 bucket
        run: |
          pip install awscli-local
          awslocal s3 mb s3://fluorite-batches
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_ENDPOINT_URL: http://localhost:4566

      - name: Run Jepsen tests (parallel)
        run: |
          cargo test -p fluorite-broker --no-fail-fast \
            --test jepsen_backpressure \
            --test jepsen_chaos_workload \
            --test jepsen_crash \
            --test jepsen_dedup_pressure \
            --test jepsen_exactly_once \
            --test jepsen_fl_corruption \
            --test jepsen_idempotent \
            --test jepsen_linearizability \
            --test jepsen_multi_broker \
            --test jepsen_multi_topic \
            --test jepsen_network_partition \
            --test jepsen_offset \
            --test jepsen_partial_commit \
            --test jepsen_partial_write \
            --test jepsen_partition \
            --test jepsen_pipelined_flush \
            --test jepsen_postgres_failure \
            --test jepsen_process_pause \
            --test jepsen_read_faults \
            --test jepsen_reader_churn \
            --test jepsen_reader_group_chaos \
            --test jepsen_reader_groups \
            --test jepsen_shutdown \
            -- --include-ignored
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_ENDPOINT_URL: http://localhost:4566

  # ---------------------------------------------------------------------------
  # Cross-language e2e (main branch only)
  # ---------------------------------------------------------------------------
  test-cross-language:
    runs-on: ubuntu-latest
    needs: [detect-changes, test-integration, test-jepsen]
    if: >-
      github.ref == 'refs/heads/main'
      && needs.detect-changes.outputs.needs-broker == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluorite
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run database migrations
        run: |
          psql "$DATABASE_URL" -f migrations/001_init.sql
          psql "$DATABASE_URL" -f migrations/002_iceberg.sql

      - name: Build Java SDK
        working-directory: sdks/java/fluorite-sdk
        run: mvn package -DskipTests --batch-mode --no-transfer-progress

      - name: Install Python SDK
        working-directory: sdks/python
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"

      - name: Run cross-language e2e test
        run: cargo test -p fluorite-broker --test cross_language_e2e -- --include-ignored
