syntax = "proto3";

package flourine.wire;

option java_package = "io.flourine.sdk.proto";
option java_multiple_files = true;

message Record {
  optional bytes key = 1;
  bytes value = 2;
}

message RecordBatch {
  uint32 topic_id = 1;
  uint32 schema_id = 2;
  repeated Record records = 3;
}

message BatchAck {
  uint32 topic_id = 1;
  uint32 schema_id = 2;
  uint64 start_offset = 3;
  uint64 end_offset = 4;
}

message AppendRequest {
  bytes writer_id = 1;
  uint64 append_seq = 2;
  repeated RecordBatch batches = 3;
}

message AppendResponse {
  uint64 append_seq = 1;
  bool success = 2;
  uint32 error_code = 3;
  string error_message = 4;
  repeated BatchAck append_acks = 5;
}

message ReadRequest {
  uint32 topic_id = 1;
  uint64 offset = 2;
  uint32 max_bytes = 3;
}

message TopicResult {
  uint32 topic_id = 1;
  uint32 schema_id = 2;
  uint64 high_watermark = 3;
  repeated Record records = 4;
}

message ReadResponse {
  bool success = 1;
  uint32 error_code = 2;
  string error_message = 3;
  repeated TopicResult results = 4;
}

message JoinGroupRequest {
  string group_id = 1;
  string reader_id = 2;
  repeated uint32 topic_ids = 3;
}

message JoinGroupResponse {
  bool success = 1;
  uint32 error_code = 2;
  string error_message = 3;
}

message HeartbeatRequest {
  string group_id = 1;
  uint32 topic_id = 2;
  string reader_id = 3;
}

enum HeartbeatStatus {
  HEARTBEAT_STATUS_OK = 0;
  HEARTBEAT_STATUS_UNKNOWN_MEMBER = 1;
}

message HeartbeatResponse {
  bool success = 1;
  uint32 error_code = 2;
  string error_message = 3;
  HeartbeatStatus status = 4;
}

message PollRequest {
  string group_id = 1;
  uint32 topic_id = 2;
  string reader_id = 3;
  uint32 max_bytes = 4;
}

message PollResponse {
  bool success = 1;
  uint32 error_code = 2;
  string error_message = 3;
  repeated TopicResult results = 4;
  uint64 start_offset = 5;
  uint64 end_offset = 6;
  uint64 lease_deadline_ms = 7;
}

message LeaveGroupRequest {
  string group_id = 1;
  uint32 topic_id = 2;
  string reader_id = 3;
}

message LeaveGroupResponse {
  bool success = 1;
  uint32 error_code = 2;
  string error_message = 3;
}

message CommitRequest {
  string group_id = 1;
  string reader_id = 2;
  uint32 topic_id = 3;
  uint64 start_offset = 4;
  uint64 end_offset = 5;
}

message CommitResponse {
  bool success = 1;
  uint32 error_code = 2;
  string error_message = 3;
}

message AuthRequest {
  string api_key = 1;
}

message AuthResponse {
  bool success = 1;
  uint32 error_code = 2;
  string error_message = 3;
}

message ClientMessage {
  oneof message {
    AppendRequest append = 1;
    ReadRequest read = 2;
    JoinGroupRequest join_group = 3;
    HeartbeatRequest heartbeat = 4;
    PollRequest poll = 5;
    LeaveGroupRequest leave_group = 6;
    CommitRequest commit = 7;
    AuthRequest auth = 8;
  }
}

message ServerMessage {
  oneof message {
    AppendResponse append = 1;
    ReadResponse read = 2;
    JoinGroupResponse join_group = 3;
    HeartbeatResponse heartbeat = 4;
    PollResponse poll = 5;
    LeaveGroupResponse leave_group = 6;
    CommitResponse commit = 7;
    AuthResponse auth = 8;
  }
}
